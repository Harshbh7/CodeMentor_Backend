# ==============================================================
# Alembic Configuration - CodeMentor AI
# ==============================================================
# Alembic manages database schema version control.
# Run: alembic upgrade head    → apply all pending migrations
# Run: alembic revision --autogenerate -m "description" → generate migration

[alembic]
# Location of the migration scripts folder
script_location = migrations

# Template for generated migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# SQLAlchemy database URL
# We use a synchronous psycopg2 driver for Alembic (Alembic runs sync migrations)
# This value is overridden in env.py using our Settings class
sqlalchemy.url = postgresql+psycopg2://codementor_user:codementor_pass@localhost:5432/codementor_db

[post_write_hooks]
# Optional: run black formatter on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
